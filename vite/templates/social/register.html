<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - Trimer</title>
    <link rel="icon" type="image/jpg" href="https://upload.wikimedia.org/wikipedia/commons/4/46/1000084215-removebg-preview.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #18191a;
            --bg-darker: #242526;
            --bg-light: #3a3b3c;
            --primary: #e4e6eb;
            --secondary: #b0b3b8;
            --border: #3e4042;
            --input-bg: var(--bg-darker);
            --input-focus-border: #3982f7;
            --button-primary-bg: #3982f7;
            --button-primary-hover-bg: #3071e2;
            --button-primary-text: var(--primary);
            --error-bg: #f7d1d1;
            --error-text: #e3405f;
            --link-color: #3982f7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-img {
            height: 45px;
            margin-left: 15px;
            filter: brightness(0) invert(1);
        }

        .brand-text {
            color: var(--primary) !important;
            font-size: 2.2rem;
            font-weight: 600;
            text-decoration: none;
        }

        .card {
            background-color: var(--bg-light);
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            padding: 30px;
        }

        .card-title {
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary);
            font-size: 1.8rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--secondary);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            background-color: var(--input-bg);
            color: var(--primary);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-control.password-field {
             padding: 12px 40px 12px 15px;
        }

        .form-control:focus {
            border-color: var(--input-focus-border);
            outline: none;
            box-shadow: 0 0 5px rgba(57, 130, 247, 0.5);
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--secondary);
            font-size: 18px;
            z-index: 10;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background-color: var(--button-primary-bg);
            border: none;
            border-radius: 8px;
            color: var(--button-primary-text);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: var(--button-primary-hover-bg);
            transform: translateY(-2px);
        }

        .error-message {
            color: var(--error-text);
            background-color: var(--error-bg);
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .text-center {
            margin-top: 20px;
            color: var(--secondary);
            font-size: 0.95em;
        }

        .text-center a {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .card { padding: 20px; }
            .card-title { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <a class="brand-text" href="#"> 
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/46/1000084215-removebg-preview.png" class="logo-img" alt="شعار Trimer">
            Trimer
        </a>
    </div>

    <div class="card">
        <h2 class="card-title">إنشاء حساب</h2>
        
        {% if form.non_field_errors %}
            {% for error in form.non_field_errors %}
                <div class="error-message">{{ error }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="{{ form.username.id_for_label }}" class="form-label">{{ form.username.label }}</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label for="{{ form.full_name.id_for_label }}" class="form-label">{{ form.full_name.label }}</label>
                {{ form.full_name }}
            </div>

            <div class="form-group">
                <label for="{{ form.profile_picture.id_for_label }}" class="form-label">{{ form.profile_picture.label }}</label>
                {{ form.profile_picture }}
            </div>

            <div class="form-group">
                <label for="{{ form.password1.id_for_label }}" class="form-label">{{ form.password1.label }}</label>
                <div style="position: relative;">
                    <input type="password" name="{{ form.password1.name }}" class="form-control password-field" required id="{{ form.password1.id_for_label }}">
                    <i class="fas fa-eye toggle-password" data-target="{{ form.password1.id_for_label }}"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="{{ form.password2.id_for_label }}" class="form-label">{{ form.password2.label }}</label>
                <div style="position: relative;">
                     <input type="password" name="{{ form.password2.name }}" class="form-control password-field" required id="{{ form.password2.id_for_label }}">
                    <i class="fas fa-eye toggle-password" data-target="{{ form.password2.id_for_label }}"></i>
                </div>
            </div>

            <button type="submit" class="btn-primary">تسجيل الآن</button>
        </form>

        <div class="text-center">
            لديك حساب بالفعل؟ <a href="{% url 'login' %}">تسجيل الدخول</a>
        </div>
    </div>

    <script>
        // إخفاء وإظهار كلمة المرور
        document.querySelectorAll('.toggle-password').forEach(item => {
            item.addEventListener('click', function () {
                const targetId = this.getAttribute('data-target');
                const passwordField = document.getElementById(targetId);
                if (passwordField.type === "password") {
                    passwordField.type = "text";
                    this.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    passwordField.type = "password";
                    this.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });
        });

        // تنسيق الحقول تلقائياً
        document.addEventListener('DOMContentLoaded', function() {
            const fieldsToStyle = ['username', 'full_name', 'profile_picture'];
            fieldsToStyle.forEach(fieldName => {
                const field = document.querySelector(`[name="${fieldName}"]`);
                if (field) field.classList.add('form-control');
            });
        });
    </script>
</body>
</html>
